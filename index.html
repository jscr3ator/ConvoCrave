<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvoCrave</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="setup-screen" id="setupScreen">
    <div class="setup-container">
      <h1>ConvoCrave</h1>
            <div id="step1">
        <div class="form-group">
          <label>Enter your username</label>
          <input type="text" id="usernameInput" placeholder="Your name" autocomplete="off">
        </div>
        <div class="button-group">
          <button onclick="setUsername()">Continue</button>
        </div>
      </div>

      <div id="step2" class="hidden">
        <div class="step-info">Welcome, <strong id="welcomeName"></strong>!</div>
        <div style="margin: 20px 0; display: flex; gap: 10px;">
          <button onclick="showCreateRoom()" id="createBtn" style="flex: 1;">Create Room</button>
          <button onclick="showJoinRoom()" id="joinBtn" style="flex: 1;">Join Room</button>
        </div>

        <div id="createRoomSection" class="hidden">
          <p style="font-size: 12px; color: #8b949e; margin-bottom: 12px;">A secure room code will be generated for you to share.</p>
          <div class="button-group">
            <button onclick="createRoom()" style="width: 100%;">Generate Room Code</button>
          </div>
        </div>

        <div id="joinRoomSection" class="hidden">
          <div class="form-group">
            <label>Enter room code</label>
            <input type="text" id="roomCodeInput" placeholder="e.g., A1B2C3D4" autocomplete="off">
          </div>
          <div class="button-group">
            <button onclick="joinRoom()" style="width: 100%;">Join Room</button>
          </div>
        </div>

        <div id="roomCreatedSection" class="hidden">
          <div class="success-message">
            <strong>Room created!</strong><br>Share this code: <strong id="roomCodeDisplay"></strong>
          </div>
          <div class="button-group">
            <button onclick="enterRoom()" style="width: 100%;">Enter Your Room</button>
          </div>
        </div>

        <div id="errorMsg" class="error-message hidden"></div>
      </div>
    </div>
  </div>

  <div class="chat-container hidden" id="chatContainer">
    <div class="chat-main">
      <div class="chat-header">
        <div>
          <h1>ConvoCrave</h1>
          <div style="font-size: 12px; color: #8b949e;">Code: <strong id="currentRoomCode">-</strong></div>
        </div>


        <div class="user-count" id="userCount">0 users</div>
      </div>
      <div class="messages" id="messages"></div>
      <div id="typingIndicator" style="padding: 8px 24px; font-size: 12px; color: #8b949e; font-style: italic; min-height: 20px;"></div>
      <div class="input-area">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('imageInput').click()" style="flex: 0; padding: 10px 12px;">📤</button>
        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
